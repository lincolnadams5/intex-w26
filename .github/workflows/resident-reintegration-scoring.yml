name: Nightly Resident Reintegration Scoring

on:
  schedule:
    - cron: '0 2 * * *'   # Every day at 2am UTC
  workflow_dispatch:        # Allow manual runs from the Actions tab

jobs:
  score-residents:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/resident_reintegration

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/resident_reintegration/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Score residents and write to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python jobs/score_residents.py --source supabase --sink supabase
